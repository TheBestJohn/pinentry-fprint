name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: aarch64
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            arch: armv7
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            arch: riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cross build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist/qml
          cp target/${{ matrix.target }}/release/pinentry-fprint dist/
          cp install.sh dist/
          cp README.md pinentry-fprint.desktop dist/
          cp qml/*.qml qml/qml-run.cpp dist/qml/
          cd dist
          tar czf ../pinentry-fprint-${{ matrix.arch }}-linux.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinentry-fprint-${{ matrix.arch }}-linux
          path: pinentry-fprint-${{ matrix.arch }}-linux.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
